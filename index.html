<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/logo/logo.svg" />
    <link rel="icon" type="image/png" href="/assets/logo/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>EnVERT — India's Premier EV Company</title>
    <meta name="title" content="EnVERT — India's Premier EV Company" />
    <meta name="description" content="EnVERT delivers complete EV solutions — 2-wheelers, 3-wheelers, cars, buses, charging infrastructure, battery management, solar integration, and fleet electrification across India." />
    <meta name="keywords" content="EV company India, electric vehicles, EV charging, battery management, fleet electrification, solar EV, electric scooter, electric bus" />
    <meta name="author" content="EnVERT Technologies Pvt. Ltd." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://envert.in/" />
    <meta property="og:title" content="EnVERT — India's Premier EV Company" />
    <meta property="og:description" content="Complete EV ecosystem — vehicles, charging, battery, solar, fleet & software solutions." />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Theme init: prevent flash -->
    <script>
      (function () {
        const theme = localStorage.getItem('envert-theme') || 'dark';
        document.documentElement.classList.add(theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
